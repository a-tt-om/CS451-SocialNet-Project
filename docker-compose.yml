services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: socialnet-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - socialnet-network

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: socialnet-php
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    networks:
      - socialnet-network

  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: socialnet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - socialnet-network

volumes:
  mysql_data:

networks:
  socialnet-network:
    driver: bridge
